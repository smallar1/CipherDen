name: CI

on:
  push:
    branches:
      - "**"

jobs:
  python:
    name: Python (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Run tests with coverage
        run: pytest --cov --cov-report=term-missing --cov-fail-under=85

  typescript:
    name: TypeScript (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for TypeScript project
        id: detect
        run: echo "exists=$([ -f package.json ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.detect.outputs.exists == 'true'
        run: npm ci

      - name: Run tests with vitest
        if: steps.detect.outputs.exists == 'true'
        run: npx vitest run